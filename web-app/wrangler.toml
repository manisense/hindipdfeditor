# Cloudflare Pages / Workers static site for hindipdfeditor.com
name = "hindipdfeditor"
compatibility_date = "2026-07-07"

# Used by `wrangler pages deploy` and Pages Git builds
pages_build_output_dir = "dist"

# Used when the dashboard deploy command is `npx wrangler deploy`
[assets]
directory = "./dist"
not_found_handling = "404-page"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
