<!doctype html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: 'NotoSansDevanagari';
        src: url('../assets/fonts/NotoSansDevanagari-Variable.ttf') format('truetype');
        font-weight: 100 900;
      }
      body {
        font-family: 'NotoSansDevanagari', sans-serif;
        font-size: 28pt;
        line-height: 1.8;
        color: #111;
      }
      .page {
        padding: 60pt;
      }
      .page:not(:first-child) {
        page-break-before: always;
      }
      .label {
        font-family: sans-serif;
        font-size: 14pt;
        color: #666;
        margin-bottom: 30pt;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="label">Page 1 of 3</div>
      <div>पहला पृष्ठ</div>
    </div>
    <div class="page">
      <div class="label">Page 2 of 3</div>
      <div>दूसरा पृष्ठ</div>
    </div>
    <div class="page">
      <div class="label">Page 3 of 3</div>
      <div>तीसरा पृष्ठ</div>
    </div>
  </body>
</html>
